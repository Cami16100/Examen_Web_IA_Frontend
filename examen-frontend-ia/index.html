<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Productos - Examen</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f4f4f4; }
        .btn { padding: 8px 12px; cursor: pointer; text-decoration: none; border: none; border-radius: 4px; }
        .btn-add { background-color: #28a745; color: white; }
        .btn-edit { background-color: #ffc107; color: black; margin-right: 5px; }
        .btn-delete { background-color: #dc3545; color: white; }
    </style>
</head>
<body>

    <h1>Gestión de Productos</h1>
    
    <a href="crear.html" class="btn btn-add">Agregar Nuevo Producto</a>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla-productos">
            </tbody>
    </table>

    <script>
        // URL de tu API (Cámbiala por la de Render cuando la tengas)
        const API_URL = "http://localhost:3000/productos";

        // Función para obtener y listar los productos
        function cargarProductos() {
            fetch(API_URL)
                .then(response => response.json())
                .then(productos => {
                    const tabla = document.getElementById('tabla-productos');
                    tabla.innerHTML = ""; // Limpiar tabla antes de llenar

                    productos.forEach(p => {
                        tabla.innerHTML += `
                            <tr>
                                <td>${p.id}</td>
                                <td>${p.nombre}</td>
                                <td>$${p.precio}</td>
                                <td>
                                    <button class="btn btn-edit" onclick="window.location.href='editar.html?id=${p.id}'">Editar</button>
                                    
                                    <button class="btn btn-delete" onclick="window.location.href='eliminar.html?id=${p.id}'">Eliminar</button>
                                </td>
                            </tr>
                        `;
                    });
                })
                .catch(error =>
