<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Producto</title>
</head>
<body>
    <h1>Editar Producto</h1>
    <form id="form-editar">
        <label>ID (No editable):</label><br>
        <input type="number" id="id" disabled><br><br>
        
        <label>Nombre:</label><br>
        <input type="text" id="nombre" required><br><br>
        
        <label>Precio:</label><br>
        <input type="number" step="0.01" id="precio" required><br><br>
        
        <button type="submit">Actualizar Producto</button>
        <a href="index.html">Cancelar</a>
    </form>

    <script>
        const API_URL = "https://examen-01-cgca.onrender.com/productos";
        const urlParams = new URLSearchParams(window.location.search);
        const productoId = urlParams.get('id');

        // 1. Cargar los datos actuales al abrir la página
        fetch(`${API_URL}/${productoId}`)
            .then(res => res.json())
            .then(p => {
                document.getElementById('id').value = p.id;
                document.getElementById('nombre').value = p.nombre;
                document.getElementById('precio').value = p.precio;
            });

        // 2. Enviar los cambios con PUT (REQUISITO DEL EXAMEN)
        document.getElementById('form-editar').addEventListener('submit', function(e) {
            e.preventDefault();
            const datosActualizados = {
                nombre: document.getElementById('nombre').value,
                precio: parseFloat(document.getElementById('precio').value)
            };

            fetch(`${API_URL}/${productoId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(datosActualizados)
            })
            .then(() => {
                alert("Producto actualizado con éxito");
                window.location.href = "index.html";
            });
        });
    </script>
</body>
</html>
